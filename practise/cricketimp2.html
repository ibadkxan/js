<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cricket</title>
  </head>
  <style>
    body {
      text-align: center;
      text-transform: uppercase;
    }
    button {
      background-color: rgb(248, 190, 190);
      border-radius: 52px;
      padding: 8px 16px;
      margin: 10px;
      cursor: pointer;
      border: 2px solid rgb(0, 0, 0);
    }
    #usermove, #computermove, #resultmsg, #scoreboard {
      margin: 25px;
      color: rgb(63, 2, 2);

    }

    .click{
      border: none;
      background-color: transparent;
    }

    .img{
      height: 120px;
    }
  </style>
  <body>

    <h1>bat ball stump game</h1>

  

    <button class="click"
      onclick="
        let computermove = computerChoice();
        let resultmsg = getresult('bat', computermove);
        showresult('bat', computermove, resultmsg);
      "
    >
          <img src="https://png.pngtree.com/png-clipart/20241102/original/pngtree-cute-cartoon-cricket-bat-clipart-illustration-png-image_16667563.png" alt="bat image"  class="img">
    </button>

    <button class="click"
      onclick="
        computermove = computerChoice();
        resultmsg = getresult('ball', computermove);
        showresult('ball', computermove, resultmsg);
      "
    >
      <img src="https://www.shutterstock.com/image-illustration/3d-shiny-new-test-match-600nw-2449821457.jpg" alt="ball image"  class="img">
    </button>

    <button class="click"
      onclick="
        computermove = computerChoice();
        resultmsg = getresult('stump', computermove);
        showresult('stump', computermove, resultmsg);
      "
    >
      <img src=https://as1.ftcdn.net/v2/jpg/17/15/68/28/1000_F_1715682851_sO6rwsYZ07iYi2Jxt5349M66BiHpK0Ni.webp alt="stump img " class="img">
    </button>


  <h1 id="usermove"></h1>
  <h1 id="computermove"></h1>
  <h1 id="resultmsg"></h1>
  <h1 id="scoreboard"></h1>


      <button onclick=" localStorage.clear(); 
    resetScore(); showresult();"> reset </button>
    
  </body>
  <script>
    let scoreStr = localStorage.getItem('score');
    let score;
    resetScore(scoreStr);
    function resetScore(scoreStr){
        score = scoreStr ? JSON.parse(scoreStr) : {
            won: 0,
            lost: 0,
            tie: 0,
        }; 
        
        score.display = function(){
          return (`won: ${this.won}, lost: ${this.lost}, tie: ${this.tie}`);
      }

      // showresult('none', 'none', 'score reset'); 

    }




    // let score = JSON.parse(scorestr) || {
    //     won: 0,
    //     lost: 0,
    //     tie: 0,
    // };

  

    // if(scorestr !== undefined){

    // } else {
    //     score = {

    //         lost: 0,
    //         tie: 0,
            
    //     };
    // }


    // score.display = function(){
    //       return (`won: ${this.won}, lost: ${this.lost}, tie: ${this.tie}`);
    //   }

    function computerChoice() {
      var randomnumber = Math.random() * 3;
      computerchoice = Math.ceil(randomnumber);
      if (computerchoice === 1) {
        computerchoice = "bat";
      } else if (computerchoice === 2) {
        computerchoice = "ball";
      } else {
        computerchoice = "stump";
      }
      return computerchoice;
    }

    function getresult(usermove, computermove) {
      var result;
      if (usermove === computermove) {
        result = "it's a tie";
        score.tie++;
      } else if (
        (usermove === "bat" && computermove === "ball") ||
        (usermove === "ball" && computermove === "stump") ||
        (usermove === "stump" && computermove === "bat")
      ) {
        result = "user wins";
        score.won++;
      } else {
        result = "computer wins";
        score.lost++;
      }
      return result;
    }

    function showresult(usermove, computermove, resultmsg) {
      // console.log(score);

      localStorage.setItem('score', JSON.stringify(score));

  
      document.querySelector('#usermove').innerText = usermove !== undefined ? `you chose ${usermove}` : ' ';
      document.querySelector('#computermove').innerText = computermove !== undefined ? `computer chose ${computermove}` : ' ';
      document.querySelector('#resultmsg').innerText = resultmsg !== undefined ? `result: ${resultmsg}` : ' ';
      document.querySelector('#scoreboard').innerText = `scoreboard: ${score.display()}`;

      // truthy and falsy 
      // document.querySelector('#usermove').innerText = usermove ? `you chose ${usermove}` : ' ';
      // document.querySelector('#computermove').innerText = computermove  ? `computer chose ${computermove}` : ' ';
      // document.querySelector('#resultmsg').innerText = resultmsg  ? `result: ${resultmsg}` : ' ';

      // alert(`you have chosen ${usermove}, computer choice is ${computermove},\n\n the result is ${resultmsg},\n\n scoreboard : ${score.display()}`);
    }
  </script>
